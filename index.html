<!DOCTYPE html>
<!-- DTD é o Document Type Definition e informa para o navegador a versão do html que está sendo carregada. assim, o navegador pode carregar um conjunto de bibliotecas de acordo com a versão específica -->

<!-- ATRIBUTOS: os atributos são do tipo chave = valor.
 EX: lang = "pt-BR", isso é um atributo que pode ter em qualquer tag de conteúdo. <html lang = "pt-BR"> ... </html> -->

<html lang="pt-BR">
	<head>
	  <meta charset="UTF-8"> <!--UTF-8 inclui letras com acento -->
	  <title>Página Principal</title>
	</head>

	<body>
	  <h1>HOME</h1> <!--titulo principal | tag semântica-->
	  <div> 
	    <a href="./pagina1.html">Página 1</a> | 
		<a href="./paginas/pagina2.html">Página 2</a> |
		<a href="https://www.fiap.com.br/">FIAP</a>
	  </div>
	</body>
</html>
